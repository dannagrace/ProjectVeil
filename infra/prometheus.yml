global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: project-veil-local
    environment: local

rule_files:
  - /etc/prometheus/rules/alerting-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus

  - job_name: project-veil-server
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - host.docker.internal:2567
        labels:
          service: project-veil-server
