<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Veil Admin Console</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3efe7;
            --panel: rgba(255, 252, 246, 0.94);
            --border: #d6c8b4;
            --text: #261d15;
            --muted: #6d5b4b;
            --accent: #8f3b2e;
            --accent-soft: #f5ddd4;
            --success: #2e7d32;
            --shadow: 0 8px 30px rgba(58, 38, 16, 0.12);
        }

        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; color: var(--text); background: var(--bg); padding: 20px; }
        main { max-width: 900px; margin: 0 auto; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-box { background: var(--accent-soft); padding: 16px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 14px; color: var(--muted); }
        input, button, select { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; }
        button { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; }
        .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
        #status { padding: 10px; border-radius: 8px; margin-bottom: 16px; display: none; white-space: pre-wrap; word-break: break-all; }
        .status-error { background: #fee2e2; color: #991b1b; display: block !important; }
        .status-success { background: #dcfce7; color: var(--success); display: block !important; }
        .report-row { border: 1px solid var(--border); border-radius: 12px; padding: 14px; background: rgba(255, 255, 255, 0.65); display: grid; gap: 10px; }
        .report-row p { margin: 0; color: var(--muted); }
        .report-row strong { color: var(--text); }
        .report-actions { display: flex; flex-wrap: wrap; gap: 8px; }
        .report-actions button[data-status="dismissed"] { background: #7a6b5d; }
        .report-actions button[data-status="warned"] { background: #c77b22; }
        .report-actions button[data-status="banned"] { background: #a32020; }
        #reportList { display: grid; gap: 12px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
        th { color: var(--muted); font-size: 13px; }
        .empty-state { color: var(--muted); }
    </style>
</head>
<body>
    <main>
        <div class="card">
            <h1>Veil Admin Console (v2.0)</h1>
            <div class="form-group">
                <label>Admin Secret</label>
                <input type="password" id="adminSecret" value="veil-admin-2026" />
            </div>
            <div id="status"></div>
        </div>

        <div class="grid">
            <div class="stat-box">
                <div class="stat-value" id="stat-rooms">-</div>
                <div class="stat-label">活跃房间</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="stat-players">-</div>
                <div class="stat-label">在线玩家</div>
            </div>
        </div>

        <div class="card">
            <h2>玩家资源修改</h2>
            <div class="form-group">
                <label>Player ID (输入 player-1)</label>
                <input type="text" id="targetPlayerId" value="player-1" />
            </div>
            <div class="grid">
                <div class="form-group"><label>Gold</label><input type="number" id="modGold" value="1000" /></div>
                <div class="form-group"><label>Wood</label><input type="number" id="modWood" value="0" /></div>
            </div>
            <button onclick="modifyResources()">确认修改并强制同步</button>
        </div>

        <div class="card">
            <h2>玩家补偿 / 退款</h2>
            <div class="grid">
                <div class="form-group">
                    <label>类型</label>
                    <select id="compensationType">
                        <option value="add">发放</option>
                        <option value="deduct">扣减</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>币种</label>
                    <select id="compensationCurrency">
                        <option value="gems">Gems</option>
                        <option value="gold">Gold</option>
                        <option value="wood">Wood</option>
                        <option value="ore">Ore</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>数量</label>
                    <input type="number" id="compensationAmount" value="100" min="1" />
                </div>
            </div>
            <div class="form-group">
                <label>原因</label>
                <input type="text" id="compensationReason" value="Failed payment refund" />
            </div>
            <div class="report-actions">
                <button onclick="submitCompensation()">提交补偿</button>
                <button onclick="fetchCompensationHistory()">刷新历史</button>
            </div>
            <div class="table-wrap" style="margin-top: 16px;">
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>类型</th>
                            <th>币种</th>
                            <th>数量</th>
                            <th>余额变化</th>
                            <th>原因</th>
                        </tr>
                    </thead>
                    <tbody id="compensationHistoryBody">
                        <tr><td colspan="6" class="empty-state">尚未加载补偿历史。</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>举报审核队列</h2>
            <div class="grid">
                <div class="form-group">
                    <label>状态筛选</label>
                    <select id="reportStatusFilter">
                        <option value="pending">待处理</option>
                        <option value="dismissed">已驳回</option>
                        <option value="warned">已警告</option>
                        <option value="banned">已封禁</option>
                    </select>
                </div>
            </div>
            <div id="reportList"><div class="empty-state">正在加载举报队列...</div></div>
        </div>
    </main>

    <script>
        const secretInput = document.getElementById('adminSecret');
        const statusDiv = document.getElementById('status');
        const reportFilter = document.getElementById('reportStatusFilter');
        const reportList = document.getElementById('reportList');
        const compensationHistoryBody = document.getElementById('compensationHistoryBody');

        function showStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = type === 'error' ? 'status-error' : 'status-success';
            statusDiv.style.display = 'block';
        }

        async function fetchOverview() {
            try {
                const res = await fetch('/api/admin/overview', {
                    headers: { 'x-veil-admin-secret': secretInput.value }
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('stat-rooms').textContent = data.activeRooms;
                    document.getElementById('stat-players').textContent = data.activePlayers;
                }
            } catch (e) {}
        }

        async function modifyResources() {
            const pid = document.getElementById('targetPlayerId').value;
            showStatus('正在发送请求...', 'success');
            
            try {
                const res = await fetch(`/api/admin/players/${pid}/resources`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-veil-admin-secret': secretInput.value 
                    },
                    body: JSON.stringify({
                        gold: parseInt(document.getElementById('modGold').value),
                        wood: parseInt(document.getElementById('modWood').value),
                        ore: 0
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    showStatus(`修改成功！\n当前 Gold: ${data.resources.gold}\n同步到房间: ${data.syncedToRoom ? '✅ 是' : '❌ 否 (无活跃房间)'}`, 'success');
                } else {
                    showStatus(`修改失败！\n状态码: ${res.status}\n原因: ${JSON.stringify(data.error || data)}`, 'error');
                }
            } catch (e) {
                showStatus(`网络错误: ${e.message}`, 'error');
            }
        }

        function renderCompensationHistory(items) {
            if (!items.length) {
                compensationHistoryBody.innerHTML = '<tr><td colspan="6" class="empty-state">当前玩家还没有补偿记录。</td></tr>';
                return;
            }

            compensationHistoryBody.innerHTML = items.map((item) => `
                <tr>
                    <td>${item.createdAt}</td>
                    <td>${item.type === 'deduct' ? '扣减' : '发放'}</td>
                    <td>${item.currency}</td>
                    <td>${item.amount}</td>
                    <td>${item.previousBalance} -> ${item.balanceAfter}</td>
                    <td>${item.reason}</td>
                </tr>
            `).join('');
        }

        async function fetchCompensationHistory() {
            const pid = document.getElementById('targetPlayerId').value.trim();
            if (!pid) {
                compensationHistoryBody.innerHTML = '<tr><td colspan="6" class="empty-state">请先输入 Player ID。</td></tr>';
                return;
            }

            try {
                const res = await fetch(`/api/admin/players/${pid}/compensation/history?limit=20`, {
                    headers: { 'x-veil-admin-secret': secretInput.value }
                });
                const data = await res.json();
                if (!res.ok) {
                    compensationHistoryBody.innerHTML = `<tr><td colspan="6" class="empty-state">加载失败：${data.error || res.status}</td></tr>`;
                    return;
                }
                renderCompensationHistory(data.items || []);
            } catch (e) {
                compensationHistoryBody.innerHTML = `<tr><td colspan="6" class="empty-state">网络错误：${e.message}</td></tr>`;
            }
        }

        async function submitCompensation() {
            const pid = document.getElementById('targetPlayerId').value.trim();
            if (!pid) {
                showStatus('请先输入 Player ID。', 'error');
                return;
            }

            showStatus('正在提交补偿请求...', 'success');

            try {
                const res = await fetch(`/api/admin/players/${pid}/compensation`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-veil-admin-secret': secretInput.value
                    },
                    body: JSON.stringify({
                        type: document.getElementById('compensationType').value,
                        currency: document.getElementById('compensationCurrency').value,
                        amount: parseInt(document.getElementById('compensationAmount').value, 10),
                        reason: document.getElementById('compensationReason').value
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    showStatus(`补偿失败！\n状态码: ${res.status}\n原因: ${JSON.stringify(data.error || data)}`, 'error');
                    return;
                }

                showStatus(
                    `补偿成功！\nGems: ${data.balances.gems}\nGold: ${data.balances.resources.gold}\nWood: ${data.balances.resources.wood}\nOre: ${data.balances.resources.ore}\n同步到房间: ${data.syncedToRoom ? '✅ 是' : '❌ 否 (无活跃房间)'}`,
                    'success'
                );
                await fetchCompensationHistory();
            } catch (e) {
                showStatus(`网络错误: ${e.message}`, 'error');
            }
        }

        function renderReports(items) {
            if (!items.length) {
                reportList.innerHTML = '<div class="empty-state">当前筛选下没有举报记录。</div>';
                return;
            }

            reportList.innerHTML = items.map((report) => `
                <div class="report-row">
                    <div><strong>${report.reportId}</strong> · ${report.reporterId} -> ${report.targetId}</div>
                    <p>原因：${report.reason} · 房间：${report.roomId} · 状态：${report.status}</p>
                    <p>创建时间：${report.createdAt}${report.description ? `\n说明：${report.description}` : ''}</p>
                    ${report.status === 'pending' ? `
                        <div class="report-actions">
                            <button data-report-id="${report.reportId}" data-status="dismissed">驳回</button>
                            <button data-report-id="${report.reportId}" data-status="warned">警告</button>
                            <button data-report-id="${report.reportId}" data-status="banned">封禁</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');

            for (const button of reportList.querySelectorAll('[data-report-id]')) {
                button.addEventListener('click', async () => {
                    const reportId = button.dataset.reportId;
                    const status = button.dataset.status;
                    if (!reportId || !status) {
                        return;
                    }
                    showStatus(`正在处理举报 ${reportId}...`, 'success');
                    try {
                        const res = await fetch(`/api/admin/reports/${reportId}/resolve`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'x-veil-admin-secret': secretInput.value
                            },
                            body: JSON.stringify({ status })
                        });
                        const data = await res.json();
                        if (!res.ok) {
                            showStatus(`处理失败：${data.error || res.status}`, 'error');
                            return;
                        }
                        showStatus(`举报 ${reportId} 已更新为 ${data.report.status}`, 'success');
                        await fetchReports();
                    } catch (e) {
                        showStatus(`网络错误: ${e.message}`, 'error');
                    }
                });
            }
        }

        async function fetchReports() {
            try {
                const status = reportFilter.value;
                const res = await fetch(`/api/admin/reports?status=${encodeURIComponent(status)}`, {
                    headers: { 'x-veil-admin-secret': secretInput.value }
                });
                if (!res.ok) {
                    const data = await res.json();
                    reportList.innerHTML = `<div class="empty-state">加载失败：${data.error || res.status}</div>`;
                    return;
                }
                const data = await res.json();
                renderReports(data.items || []);
            } catch (e) {
                reportList.innerHTML = `<div class="empty-state">网络错误：${e.message}</div>`;
            }
        }

        setInterval(fetchOverview, 5000);
        reportFilter.addEventListener('change', () => { void fetchReports(); });
        fetchOverview();
        fetchReports();
        fetchCompensationHistory();
    </script>
</body>
</html>
