name: CI

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

on:
  push:
    branches:
      - main
    tags:
      - wechat-release-*
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      upload:
        description: Upload the packaged WeChat release artifact via miniprogram-ci
        required: false
        default: false
        type: boolean
      release_version:
        description: WeChat upload version, required when upload is enabled
        required: false
        type: string
      upload_desc:
        description: Optional upload description override
        required: false
        type: string

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kubernetes-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.33.1

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Pin Kubernetes image tag for validation
        run: |
          cp -R k8s "${RUNNER_TEMP}/k8s"
          cd "${RUNNER_TEMP}/k8s"
          kustomize edit set image ghcr.io/dannagrace/projectveil-server=ghcr.io/dannagrace/projectveil-server:${GITHUB_SHA}

      - name: Setup kind
        uses: engineerd/setup-kind@v0.6.2
        with:
          version: v0.24.0

      - name: Dry-run Kubernetes manifests
        run: kubectl apply --dry-run=client -k "${RUNNER_TEMP}/k8s"

  readme-script-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: contributor quickstart
            command: npm run validate:quickstart
          - label: config center regression
            command: npm run test:client:config-center
          - label: shared contract snapshots
            command: npm run test:contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm runtime
        run: npm install --global npm@10.9.3

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Gate README command: ${{ matrix.command }}
        run: ${{ matrix.command }}

      - name: Summarize README command gate
        if: always()
        run: |
          {
            echo "## README Script Gate"
            echo
            echo "- README command: \`${{ matrix.command }}\`"
            echo "- Gate label: \`${{ matrix.label }}\`"
            echo "- Workflow job: \`readme-script-gate\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  arch-boundaries:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Enforce architecture boundaries
        run: npm run lint:arch

      - name: Summarize boundary gate
        if: always()
        run: |
          {
            echo "## Architecture Boundaries"
            echo
            echo "- Config: \`.dependency-cruiser.cjs\`"
            echo "- Docs: \`docs/architecture-boundaries.md\`"
            echo "- Command: \`npm run lint:arch\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  ops-tooling-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Detect PRs that touch ops tooling typecheck surfaces
        id: ops-tooling
        run: |
          changed_paths="${RUNNER_TEMP}/ops-tooling/changed-paths-${GITHUB_SHA}.txt"
          mkdir -p "$(dirname "${changed_paths}")"
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" | tee "${changed_paths}"

          touched=false
          if rg -n \
            '^(scripts/audit-codex-automation-branches\.ts|scripts/test/codex-automation-branches\.test\.ts|tsconfig\.ops-tooling\.json|package(-lock)?\.json|\.github/workflows/ci\.yml)$' \
            "${changed_paths}" >/dev/null; then
            touched=true
          fi

          echo "touched=${touched}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Ops Tooling Typecheck Detection"
            echo
            echo "- Base ref: \`${{ github.base_ref }}\`"
            echo "- Qualifying paths touched: \`${touched}\`"
            echo "- Changed-path report: \`${changed_paths}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Typecheck ops tooling surface
        if: steps.ops-tooling.outputs.touched == 'true'
        run: npm run typecheck:ops

  k8s-configmap-placeholder-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Detect PRs that touch Kubernetes manifests
        id: k8s-config
        run: |
          changed_paths="${RUNNER_TEMP}/k8s-configmap/changed-paths-${GITHUB_SHA}.txt"
          mkdir -p "$(dirname "${changed_paths}")"
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" | tee "${changed_paths}"

          touched=false
          if rg -n '^(k8s/|scripts/validate-k8s-configmap-placeholders\.ts|scripts/test/validate-k8s-configmap-placeholders\.test\.ts|\.github/workflows/ci\.yml|package(-lock)?\.json)$' "${changed_paths}" >/dev/null; then
            touched=true
          fi

          echo "touched=${touched}" >> "${GITHUB_OUTPUT}"
          {
            echo "## K8s ConfigMap Placeholder Detection"
            echo
            echo "- Base ref: \`${{ github.base_ref }}\`"
            echo "- Qualifying paths touched: \`${touched}\`"
            echo "- Changed-path report: \`${changed_paths}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Validate k8s ConfigMap placeholder values
        if: steps.k8s-config.outputs.touched == 'true'
        run: npm run validate:k8s-configmap

  content-smoke-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Detect PRs that touch campaign or boss-template smoke surfaces
        id: content-smoke
        if: github.event_name == 'pull_request'
        run: |
          changed_paths="${RUNNER_TEMP}/content-smoke/changed-paths-${GITHUB_SHA}.txt"
          mkdir -p "$(dirname "${changed_paths}")"
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" | tee "${changed_paths}"

          touched=false
          if rg -n \
            '^(configs/campaign-chapter[1-4]\.json|configs/boss-encounter-templates\.json|apps/server/src/pve-content\.ts|scripts/content-smoke-gate\.ts|scripts/test/content-smoke-gate\.test\.ts|scripts/validate-content-pack\.ts|\.github/workflows/ci\.yml|package(-lock)?\.json)$' \
            "${changed_paths}" >/dev/null; then
            touched=true
          fi

          echo "touched=${touched}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Content Smoke Detection"
            echo
            echo "- Base ref: \`${{ github.base_ref }}\`"
            echo "- Qualifying paths touched: \`${touched}\`"
            echo "- Changed-path report: \`${changed_paths}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Validate campaign and boss-template smoke slice
        if: github.event_name != 'pull_request' || steps.content-smoke.outputs.touched == 'true'
        run: npm run validate:content-smoke -- --report-path "${RUNNER_TEMP}/content-smoke-report.json"

      - name: Summarize content smoke gate
        if: always() && (github.event_name != 'pull_request' || steps.content-smoke.outputs.touched == 'true')
        run: |
          node <<'EOF'
          const fs = require("node:fs");
          const reportPath = process.env.RUNNER_TEMP + "/content-smoke-report.json";
          if (!fs.existsSync(reportPath)) {
            process.exit(0);
          }
          const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
          const lines = [
            "## Content Smoke Gate",
            "",
            `- Result: \`${report.valid ? "PASS" : "FAIL"}\``,
            `- Campaign missions: \`${report.campaign.missionCount}\` across \`${report.campaign.chapterCount}\` chapters`,
            `- Boss missions: \`${report.campaign.bossMissionCount}\``,
            `- Representative boss scenario: \`${report.campaign.representativeBossMission.id}\` on \`${report.campaign.representativeBossMission.mapId}\` using \`${report.campaign.representativeBossMission.bossTemplateId}\``,
            `- Validated bundles: \`${report.contentPack.validatedBundleIds.join(", ")}\``
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join("\n")}\n`);
          EOF

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck:ci

      - name: Validate content-pack consistency
        run: npm run validate:content-pack -- --report-path "${RUNNER_TEMP}/content-pack-validation-report.json"

      - name: Validate all shipped content-pack variants
        run: npm run validate:content-pack:all

      - name: Validate release script inventory stays in sync
        run: npm run test:release-script-inventory

      - name: Test With V8 Coverage
        run: npm run test:coverage:ci

      - name: Capture runtime regression artifact
        if: always()
        run: |
          node --import tsx ./scripts/stress-concurrent-rooms.ts \
            --rooms=48 \
            --connect-concurrency=12 \
            --action-concurrency=12 \
            --sample-interval-ms=100 \
            --reconnect-pause-ms=150 \
            --artifact-path "${RUNNER_TEMP}/release-readiness/stress-rooms-runtime-metrics-${GITHUB_SHA}.json"

      - name: Compare runtime regression against baseline
        if: always()
        run: |
          node --import tsx ./scripts/compare-runtime-regression.ts \
            --baseline ./configs/runtime-regression-baseline.json \
            --artifact "${RUNNER_TEMP}/release-readiness/stress-rooms-runtime-metrics-${GITHUB_SHA}.json" \
            --output "${RUNNER_TEMP}/release-readiness/runtime-regression-report-${GITHUB_SHA}.json"

      - name: Capture reconnect soak release-gate artifact
        if: always()
        run: |
          npm run stress:rooms:reconnect-soak -- \
            --artifact-path "${RUNNER_TEMP}/release-readiness/colyseus-reconnect-soak-summary-${GITHUB_SHA}.json"

      - name: Publish coverage summary
        if: always()
        run: |
          if [[ -f .coverage/summary.md ]]; then
            cat .coverage/summary.md >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload V8 coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v8-coverage-${{ github.sha }}
          path: .coverage
          if-no-files-found: error

      - name: Upload content-pack validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-pack-validation-${{ github.sha }}
          path: ${{ runner.temp }}/content-pack-validation-report.json
          if-no-files-found: error

      - name: Upload runtime regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-regression-${{ github.sha }}
          path: ${{ runner.temp }}/release-readiness
          if-no-files-found: error

  wechat-build-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      WECHAT_RELEASE_ARTIFACTS_DIR: ${{ runner.temp }}/wechat-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Detect PRs that touch Cocos release packaging surfaces
        id: cocos-release-packaging
        if: github.event_name == 'pull_request'
        run: |
          changed_paths="${RUNNER_TEMP}/release-readiness/cocos-release-packaging-changed-paths-${GITHUB_SHA}.txt"
          mkdir -p "$(dirname "${changed_paths}")"
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" | tee "${changed_paths}"

          touched=false
          if rg -n \
            '^(apps/cocos-client/|scripts/cocos-[^/]+|scripts/.*release.*|docs/cocos-[^/]+|apps/cocos-client/build-templates/wechatgame/|apps/cocos-client/test/fixtures/wechatgame-export/|apps/cocos-client/wechat-minigame\.build\.json$)' \
            "${changed_paths}" >/dev/null; then
            touched=true
          fi

          echo "touched=${touched}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Cocos Release Packaging PR Detection"
            echo
            echo "- Base ref: \`${{ github.base_ref }}\`"
            echo "- Qualifying paths touched: \`${touched}\`"
            echo "- Changed-path report: \`${changed_paths}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Check WeChat mini game templates and exported fixture
        run: npm run check:wechat-build

      - name: Package WeChat exported fixture
        run: npm run package:wechat-release -- --output-dir apps/cocos-client/test/fixtures/wechatgame-export --artifacts-dir "${WECHAT_RELEASE_ARTIFACTS_DIR}" --expect-exported-runtime --source-revision "${GITHUB_SHA}"

      - name: Audit primary Cocos client delivery readiness
        run: |
          npm run audit:cocos-primary-delivery -- \
            --output-dir apps/cocos-client/test/fixtures/wechatgame-export \
            --artifacts-dir "${WECHAT_RELEASE_ARTIFACTS_DIR}" \
            --expect-exported-runtime \
            --expected-revision "${GITHUB_SHA}" \
            --output "${RUNNER_TEMP}/release-readiness/cocos-primary-delivery-audit-${GITHUB_SHA}.json" \
            --markdown-output "${RUNNER_TEMP}/release-readiness/cocos-primary-delivery-audit-${GITHUB_SHA}.md" \
            --github-step-summary "${GITHUB_STEP_SUMMARY}"

      - name: Run canonical primary Cocos journey smoke
        if: always() && github.event_name == 'pull_request' && steps.cocos-release-packaging.outputs.touched == 'true'
        run: |
          npm run smoke:cocos:canonical-journey -- \
            --output "${RUNNER_TEMP}/release-readiness/cocos-primary-journey-smoke-${GITHUB_SHA}.json" \
            --markdown-output "${RUNNER_TEMP}/release-readiness/cocos-primary-journey-smoke-${GITHUB_SHA}.md"

      - name: Capture primary Cocos diagnostics evidence
        if: always() && github.event_name == 'pull_request' && steps.cocos-release-packaging.outputs.touched == 'true'
        run: |
          npm run release:cocos:primary-diagnostics -- \
            --output "${RUNNER_TEMP}/release-readiness/cocos-primary-client-diagnostics-${GITHUB_SHA}.json" \
            --markdown-output "${RUNNER_TEMP}/release-readiness/cocos-primary-client-diagnostics-${GITHUB_SHA}.md"

      - name: Upload WeChat release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wechat-release-${{ github.sha }}
          path: ${{ env.WECHAT_RELEASE_ARTIFACTS_DIR }}
          if-no-files-found: error

      - name: Upload primary Cocos delivery audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cocos-primary-delivery-audit-${{ github.sha }}
          path: ${{ runner.temp }}/release-readiness/cocos-primary-delivery-audit-${{ github.sha }}.*
          if-no-files-found: error

      - name: Assemble PR Cocos diagnostics evidence bundle
        if: always() && github.event_name == 'pull_request' && steps.cocos-release-packaging.outputs.touched == 'true'
        env:
          BUNDLE_DIR: ${{ runner.temp }}/release-readiness/cocos-release-packaging-evidence-${{ github.sha }}
        run: |
          mkdir -p "${BUNDLE_DIR}"

          changed_paths="${RUNNER_TEMP}/release-readiness/cocos-release-packaging-changed-paths-${GITHUB_SHA}.txt"
          audit_json="${RUNNER_TEMP}/release-readiness/cocos-primary-delivery-audit-${GITHUB_SHA}.json"
          audit_md="${RUNNER_TEMP}/release-readiness/cocos-primary-delivery-audit-${GITHUB_SHA}.md"
          smoke_json="${RUNNER_TEMP}/release-readiness/cocos-primary-journey-smoke-${GITHUB_SHA}.json"
          smoke_md="${RUNNER_TEMP}/release-readiness/cocos-primary-journey-smoke-${GITHUB_SHA}.md"
          diagnostics_json="${RUNNER_TEMP}/release-readiness/cocos-primary-client-diagnostics-${GITHUB_SHA}.json"
          diagnostics_md="${RUNNER_TEMP}/release-readiness/cocos-primary-client-diagnostics-${GITHUB_SHA}.md"
          summary_path="${BUNDLE_DIR}/SUMMARY.md"

          cp "${changed_paths}" "${BUNDLE_DIR}/changed-paths.txt"
          for candidate in "${audit_json}" "${audit_md}" "${smoke_json}" "${smoke_md}" "${diagnostics_json}" "${diagnostics_md}"; do
            if [[ -f "${candidate}" ]]; then
              cp "${candidate}" "${BUNDLE_DIR}/"
            fi
          done

          {
            echo "# Cocos Release Packaging Diagnostics Evidence"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Trigger: qualifying Cocos release packaging paths changed"
            echo "- Changed paths: \`changed-paths.txt\`"
            echo
            echo "## Expected evidence"
            if [[ -f "${audit_json}" && -f "${audit_md}" ]]; then
              echo "- Delivery audit: present"
            else
              echo "- Delivery audit: missing. Regressed command: \`npm run audit:cocos-primary-delivery -- --output-dir apps/cocos-client/test/fixtures/wechatgame-export --artifacts-dir \\\"\${WECHAT_RELEASE_ARTIFACTS_DIR}\\\" --expect-exported-runtime --expected-revision \\\"\${GITHUB_SHA}\\\"\`"
            fi
            if [[ -f "${smoke_json}" && -f "${smoke_md}" ]]; then
              echo "- Canonical Cocos journey smoke: present"
            else
              echo "- Canonical Cocos journey smoke: missing. Regressed command: \`npm run smoke:cocos:canonical-journey -- --output <json> --markdown-output <md>\`"
            fi
            if [[ -f "${diagnostics_json}" && -f "${diagnostics_md}" ]]; then
              echo "- Primary-client diagnostics: present"
            else
              echo "- Primary-client diagnostics: missing. Regressed command: \`npm run release:cocos:primary-diagnostics -- --output <json> --markdown-output <md>\`"
            fi
            echo
            echo "Review this bundle before merge when a PR changes release packaging surfaces."
          } > "${summary_path}"

          cat "${summary_path}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload PR Cocos diagnostics evidence bundle
        if: always() && github.event_name == 'pull_request' && steps.cocos-release-packaging.outputs.touched == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cocos-release-packaging-evidence-${{ github.sha }}
          path: ${{ runner.temp }}/release-readiness/cocos-release-packaging-evidence-${{ github.sha }}
          if-no-files-found: error

  wechat-release-artifact-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - wechat-build-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Download packaged WeChat release artifact
        uses: actions/download-artifact@v4
        with:
          name: wechat-release-${{ github.sha }}
          path: ${{ runner.temp }}/wechat-release-downloaded

      - name: Verify downloaded WeChat release artifact
        run: npm run verify:wechat-release -- --artifacts-dir "${RUNNER_TEMP}/wechat-release-downloaded" --expected-revision "${GITHUB_SHA}"

  client-release-candidate-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run packaged client RC smoke
        run: npm run smoke:client:release-candidate -- --output "${RUNNER_TEMP}/release-readiness/client-release-candidate-smoke-${GITHUB_SHA}.json"

      - name: Upload packaged client RC smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-release-candidate-smoke-${{ github.sha }}
          path: ${{ runner.temp }}/release-readiness
          if-no-files-found: error

  h5-connectivity-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NPM_CONFIG_LOGS_DIR: ${{ runner.temp }}/npm-logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm runtime
        run: npm install --global npm@10.9.3

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run H5 connectivity smoke
        run: npm run test:e2e:h5:connectivity

      - name: Upload H5 connectivity smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: h5-connectivity-smoke-${{ github.sha }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload H5 connectivity npm logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: h5-connectivity-npm-logs-${{ github.sha }}
          path: ${{ runner.temp }}/npm-logs
          if-no-files-found: ignore
          retention-days: 14

  publish-release-signal-trend:
    name: Release health gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - validate
      - wechat-build-validation
      - client-release-candidate-smoke
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Download V8 coverage artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: v8-coverage-${{ github.sha }}
          path: .coverage

      - name: Download runtime regression artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: runtime-regression-${{ github.sha }}
          path: ${{ runner.temp }}/runtime-regression

      - name: Download packaged client RC smoke artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: client-release-candidate-smoke-${{ github.sha }}
          path: ${{ runner.temp }}/release-readiness

      - name: Download WeChat release artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: wechat-release-${{ github.sha }}
          path: ${{ runner.temp }}/wechat-release

      - name: Resolve previous successful history baseline
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        id: history-baseline
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const response = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "release-readiness-history.yml",
              branch,
              status: "completed",
              per_page: 20
            });

            const baseline = response.data.workflow_runs.find((run) => run.conclusion === "success");
            core.setOutput("run-id", baseline ? String(baseline.id) : "");
            core.setOutput("run-url", baseline?.html_url ?? "");

      - name: Download previous release-readiness history artifact
        if: steps.history-baseline.outputs.run-id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.history-baseline.outputs.run-id }}
          name: release-readiness-history
          path: ${{ runner.temp }}/baseline

      - name: Build release gate summary artifact
        continue-on-error: true
        run: |
          node --import tsx ./scripts/ci-release-readiness-snapshot.ts \
            --validate-status "${{ needs.validate.result }}" \
            --wechat-build-status "${{ needs.wechat-build-validation.result }}" \
            --client-rc-smoke-status "${{ needs.client-release-candidate-smoke.result }}" \
            --output "${RUNNER_TEMP}/release-readiness/release-readiness-${GITHUB_SHA}.json"

          args=(
            --snapshot "${RUNNER_TEMP}/release-readiness/release-readiness-${GITHUB_SHA}.json"
            --output "${RUNNER_TEMP}/release-readiness/release-gate-summary-${GITHUB_SHA}.json"
            --markdown-output "${RUNNER_TEMP}/release-readiness/release-gate-summary-${GITHUB_SHA}.md"
          )
          if [[ -f "${RUNNER_TEMP}/release-readiness/client-release-candidate-smoke-${GITHUB_SHA}.json" ]]; then
            args+=(--h5-smoke "${RUNNER_TEMP}/release-readiness/client-release-candidate-smoke-${GITHUB_SHA}.json")
          fi
          if [[ -f "${RUNNER_TEMP}/runtime-regression/colyseus-reconnect-soak-summary-${GITHUB_SHA}.json" ]]; then
            args+=(--reconnect-soak "${RUNNER_TEMP}/runtime-regression/colyseus-reconnect-soak-summary-${GITHUB_SHA}.json")
          fi
          if [[ -d "${RUNNER_TEMP}/wechat-release" ]]; then
            args+=(--wechat-artifacts-dir "${RUNNER_TEMP}/wechat-release")
          fi
          npm run release:gate:summary -- "${args[@]}"

      - name: Publish trend summary
        run: |
          args=(
            --output "${RUNNER_TEMP}/release-readiness/ci-trend-summary-${GITHUB_SHA}.json"
            --markdown-output "${RUNNER_TEMP}/release-readiness/ci-trend-summary-${GITHUB_SHA}.md"
            --github-step-summary "${GITHUB_STEP_SUMMARY}"
          )
          if [[ -f "${RUNNER_TEMP}/runtime-regression/runtime-regression-report-${GITHUB_SHA}.json" ]]; then
            args+=(--runtime-report "${RUNNER_TEMP}/runtime-regression/runtime-regression-report-${GITHUB_SHA}.json")
          fi
          if [[ -f "${RUNNER_TEMP}/release-readiness/release-gate-summary-${GITHUB_SHA}.json" ]]; then
            args+=(--release-gate-report "${RUNNER_TEMP}/release-readiness/release-gate-summary-${GITHUB_SHA}.json")
          fi
          if [[ ${#args[@]} -le 3 ]]; then
            echo "No current runtime or release-gate report was available to summarize." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          npm run ci:trend-summary -- "${args[@]}"

      - name: Build release readiness dashboard artifact
        continue-on-error: true
        run: |
          args=(
            --snapshot "${RUNNER_TEMP}/release-readiness/release-readiness-${GITHUB_SHA}.json"
            --candidate-revision "${GITHUB_SHA}"
            --output "${RUNNER_TEMP}/release-readiness/release-readiness-dashboard-${GITHUB_SHA}.json"
            --markdown-output "${RUNNER_TEMP}/release-readiness/release-readiness-dashboard-${GITHUB_SHA}.md"
          )
          if [[ -d "${RUNNER_TEMP}/wechat-release" ]]; then
            args+=(--wechat-artifacts-dir "${RUNNER_TEMP}/wechat-release")
          fi
          npm run release:readiness:dashboard -- "${args[@]}"

      - name: Build release health summary artifact
        run: |
          args=(
            --release-readiness "${RUNNER_TEMP}/release-readiness/release-readiness-${GITHUB_SHA}.json"
            --release-gate-summary "${RUNNER_TEMP}/release-readiness/release-gate-summary-${GITHUB_SHA}.json"
            --ci-trend-summary "${RUNNER_TEMP}/release-readiness/ci-trend-summary-${GITHUB_SHA}.json"
            --output "${RUNNER_TEMP}/release-readiness/release-health-summary-${GITHUB_SHA}.json"
            --markdown-output "${RUNNER_TEMP}/release-readiness/release-health-summary-${GITHUB_SHA}.md"
          )
          if [[ -f "${RUNNER_TEMP}/release-readiness/release-readiness-dashboard-${GITHUB_SHA}.json" ]]; then
            args+=(--release-readiness-dashboard "${RUNNER_TEMP}/release-readiness/release-readiness-dashboard-${GITHUB_SHA}.json")
          fi
          if [[ -f "${RUNNER_TEMP}/baseline/release-readiness-dashboard.json" ]]; then
            args+=(--previous-release-readiness-dashboard "${RUNNER_TEMP}/baseline/release-readiness-dashboard.json")
          fi
          if [[ -f ".coverage/summary.json" ]]; then
            args+=(--coverage-summary ".coverage/summary.json")
          fi
          # release-health-summary exits non-zero only for blocking conditions; warnings still publish artifacts/comments.
          npm run release:health:summary -- "${args[@]}"

      - name: Build go/no-go decision packet artifact
        if: |
          always() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        run: |
          candidate="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          candidate_slug="$(printf '%s' "${candidate}" | tr -cs '[:alnum:]._-' '-' | sed 's/^-*//; s/-*$//')"
          short_sha="${GITHUB_SHA::7}"
          dossier_dir="${RUNNER_TEMP}/release-readiness/phase1-candidate-dossier-${candidate_slug}-${short_sha}"

          args=(
            --candidate "${candidate}"
            --candidate-revision "${GITHUB_SHA}"
            --snapshot "${RUNNER_TEMP}/release-readiness/release-readiness-${GITHUB_SHA}.json"
            --target-surface wechat
            --output-dir "${dossier_dir}"
          )
          if [[ -f "${RUNNER_TEMP}/release-readiness/client-release-candidate-smoke-${GITHUB_SHA}.json" ]]; then
            args+=(--h5-smoke "${RUNNER_TEMP}/release-readiness/client-release-candidate-smoke-${GITHUB_SHA}.json")
          fi
          if [[ -f "${RUNNER_TEMP}/runtime-regression/colyseus-reconnect-soak-summary-${GITHUB_SHA}.json" ]]; then
            args+=(--reconnect-soak "${RUNNER_TEMP}/runtime-regression/colyseus-reconnect-soak-summary-${GITHUB_SHA}.json")
          fi
          if [[ -d "${RUNNER_TEMP}/wechat-release" ]]; then
            args+=(--wechat-artifacts-dir "${RUNNER_TEMP}/wechat-release")
          fi
          if [[ -f "${RUNNER_TEMP}/release-readiness/ci-trend-summary-${GITHUB_SHA}.json" ]]; then
            args+=(--ci-trend-summary "${RUNNER_TEMP}/release-readiness/ci-trend-summary-${GITHUB_SHA}.json")
          fi
          if [[ -f ".coverage/summary.json" ]]; then
            args+=(--coverage-summary ".coverage/summary.json")
          fi

          npm run release:phase1:candidate-dossier -- "${args[@]}"
          npm run release:go-no-go-packet -- \
            --dossier "${dossier_dir}/phase1-candidate-dossier.json" \
            --release-gate-summary "${RUNNER_TEMP}/release-readiness/release-gate-summary-${GITHUB_SHA}.json" \
            --output "${RUNNER_TEMP}/release-readiness/go-no-go-decision-packet-${candidate_slug}-${short_sha}.json" \
            --markdown-output "${RUNNER_TEMP}/release-readiness/go-no-go-decision-packet-${candidate_slug}-${short_sha}.md"

      - name: Build PR release summary comment
        if: |
          always() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          candidate="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          candidate_slug="$(printf '%s' "${candidate}" | tr -cs '[:alnum:]._-' '-' | sed 's/^-*//; s/-*$//')"
          short_sha="${GITHUB_SHA::7}"
          packet_args=()
          if [[ -f "${RUNNER_TEMP}/release-readiness/go-no-go-decision-packet-${candidate_slug}-${short_sha}.json" ]]; then
            packet_args+=(--go-no-go-packet "${RUNNER_TEMP}/release-readiness/go-no-go-decision-packet-${candidate_slug}-${short_sha}.json")
          fi

          node --import tsx ./scripts/release-pr-comment.ts \
            --release-gate-summary "${RUNNER_TEMP}/release-readiness/release-gate-summary-${GITHUB_SHA}.json" \
            --release-health-summary "${RUNNER_TEMP}/release-readiness/release-health-summary-${GITHUB_SHA}.json" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            "${packet_args[@]}" \
            --output "${RUNNER_TEMP}/release-readiness/release-pr-comment-${GITHUB_SHA}.md"

      - name: Comment PR with release summary
        if: |
          always() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          COMMENT_PATH: ${{ runner.temp }}/release-readiness/release-pr-comment-${{ github.sha }}.md
        with:
          script: |
            const fs = require("node:fs");
            const marker = "<!-- project-veil-release-summary -->";
            const body = fs.readFileSync(process.env.COMMENT_PATH, "utf8");
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find((comment) => comment.user?.type === "Bot" && comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

      - name: Upload release signal trend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-trend-summary-${{ github.sha }}
          path: ${{ runner.temp }}/release-readiness
          if-no-files-found: error

  wechat-release-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - wechat-build-validation
      - wechat-release-artifact-smoke
      - client-release-candidate-smoke
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.upload == 'true') ||
      startsWith(github.ref, 'refs/tags/wechat-release-')
    env:
      WECHAT_UPLOAD_ARTIFACTS_DIR: ${{ runner.temp }}/wechat-release-upload

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Download packaged WeChat release artifact
        uses: actions/download-artifact@v4
        with:
          name: wechat-release-${{ github.sha }}
          path: ${{ env.WECHAT_UPLOAD_ARTIFACTS_DIR }}

      - name: Check WeChat upload secrets
        id: wechat-secrets
        env:
          WECHAT_MINIPROGRAM_APPID: ${{ secrets.WECHAT_MINIPROGRAM_APPID }}
          WECHAT_MINIPROGRAM_PRIVATE_KEY: ${{ secrets.WECHAT_MINIPROGRAM_PRIVATE_KEY }}
          WECHAT_MINIPROGRAM_PRIVATE_KEY_BASE64: ${{ secrets.WECHAT_MINIPROGRAM_PRIVATE_KEY_BASE64 }}
        run: |
          if [[ -n "${WECHAT_MINIPROGRAM_APPID}" && ( -n "${WECHAT_MINIPROGRAM_PRIVATE_KEY}" || -n "${WECHAT_MINIPROGRAM_PRIVATE_KEY_BASE64}" ) ]]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "ready=false" >> "${GITHUB_OUTPUT}"
          {
            echo "## WeChat Mini Game Upload"
            echo
            echo "- Status: skipped"
            echo "- Reason: missing \`WECHAT_MINIPROGRAM_APPID\` and/or private key secret"
            echo "- Expected secrets: \`WECHAT_MINIPROGRAM_APPID\` plus one of \`WECHAT_MINIPROGRAM_PRIVATE_KEY\` or \`WECHAT_MINIPROGRAM_PRIVATE_KEY_BASE64\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Resolve upload inputs
        id: upload-inputs
        if: steps.wechat-secrets.outputs.ready == 'true'
        env:
          DISPATCH_RELEASE_VERSION: ${{ github.event.inputs.release_version }}
          DISPATCH_UPLOAD_DESC: ${{ github.event.inputs.upload_desc }}
        run: |
          version="${DISPATCH_RELEASE_VERSION}"
          desc="${DISPATCH_UPLOAD_DESC}"
          if [[ "${GITHUB_REF}" == refs/tags/wechat-release-* ]]; then
            version="${GITHUB_REF_NAME#wechat-release-}"
          fi
          if [[ -z "${version}" ]]; then
            echo "WeChat upload version is required for workflow_dispatch uploads or must be encoded in tag refs/tags/wechat-release-<version>." >&2
            exit 1
          fi
          {
            echo "version=${version}"
            echo "desc<<EOF"
            echo "${desc}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload packaged WeChat release artifact
        if: steps.wechat-secrets.outputs.ready == 'true'
        env:
          WECHAT_MINIPROGRAM_APPID: ${{ secrets.WECHAT_MINIPROGRAM_APPID }}
          WECHAT_MINIPROGRAM_PRIVATE_KEY: ${{ secrets.WECHAT_MINIPROGRAM_PRIVATE_KEY }}
          WECHAT_MINIPROGRAM_PRIVATE_KEY_BASE64: ${{ secrets.WECHAT_MINIPROGRAM_PRIVATE_KEY_BASE64 }}
          WECHAT_MINIPROGRAM_DESC: ${{ steps.upload-inputs.outputs.desc }}
        run: |
          npm run upload:wechat-release -- \
            --artifacts-dir "${WECHAT_UPLOAD_ARTIFACTS_DIR}" \
            --version "${{ steps.upload-inputs.outputs.version }}"

      - name: Upload WeChat upload receipt
        if: steps.wechat-secrets.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wechat-upload-${{ github.sha }}
          path: ${{ env.WECHAT_UPLOAD_ARTIFACTS_DIR }}/*.upload.json
          if-no-files-found: error
