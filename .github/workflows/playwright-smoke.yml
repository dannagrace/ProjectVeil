name: Playwright Smoke

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: playwright-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  h5-smoke:
    name: H5 / Lobby Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NPM_CONFIG_LOGS_DIR: ${{ runner.temp }}/npm-logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm runtime
        run: npm install --global npm@10.9.3

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run H5 smoke tests
        run: npm run test:e2e:smoke

      - name: Upload H5 Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-h5-${{ github.sha }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload H5 npm logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-h5-npm-logs-${{ github.sha }}
          path: ${{ runner.temp }}/npm-logs
          if-no-files-found: ignore
          retention-days: 14

  multiplayer-smoke:
    name: Multiplayer Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    env:
      NPM_CONFIG_LOGS_DIR: ${{ runner.temp }}/npm-logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm runtime
        run: npm install --global npm@10.9.3

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run multiplayer smoke tests
        run: npm run test:e2e:multiplayer:smoke

      - name: Upload multiplayer Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-multiplayer-${{ github.sha }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload multiplayer npm logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-multiplayer-npm-logs-${{ github.sha }}
          path: ${{ runner.temp }}/npm-logs
          if-no-files-found: ignore
          retention-days: 14
