name: Playwright Multiplayer

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: playwright-multiplayer-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  multiplayer:
    name: Multiplayer Full Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NPM_CONFIG_LOGS_DIR: ${{ runner.temp }}/npm-logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm runtime
        run: npm install --global npm@10.9.3

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run multiplayer Playwright suite
        run: npm test -- e2e:multiplayer

      - name: Upload multiplayer Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-multiplayer-${{ github.sha }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload multiplayer npm logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-multiplayer-npm-logs-${{ github.sha }}
          path: ${{ runner.temp }}/npm-logs
          if-no-files-found: ignore
          retention-days: 14
